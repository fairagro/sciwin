name: ðŸ¦º Coverage
on:
  workflow_call:

jobs:
  coverage:
    name: â˜” Tarpaulin
    permissions:
      contents: read
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config --global user.name "$(git --no-pager log --format=format:'%an' -n 1)"
          git config --global user.email "$(git --no-pager log --format=format:'%ae' -n 1)"
      - name: Disable man-db to make package install and removal faster
        run: |
          echo 'set man-db/auto-update false' | sudo debconf-communicate >/dev/null
          sudo dpkg-reconfigure man-db
      - name: Free Disk Space (Ubuntu) # Attempting to get around 16gb space limitations when using tarpaulin
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
      - run: |
          sudo apt-get update 
          sudo apt-get install -y \
          libgtk-3-dev \
          libglib2.0-dev \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Tarpaulin ðŸ“ˆ
        run: cargo install cargo-tarpaulin --force
      - name: Run coverage
        run: cargo tarpaulin --workspace --out Xml --exclude-files tests/* tests/**/* packages/**/tests/**/* packages/**/tests/*
      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "cobertura.xml"
          badge: true
          hide_branch_rate: false
          hide_complexity: true # as it is not supported by tarpaulin
          format: "markdown"
          output: "both"

      - name: Add Coverage PR Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Write to Job Summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY